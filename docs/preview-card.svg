<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="3D Parallax Profile Card preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141018"/>
      <stop offset="100%" stop-color="#0b0b0e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.015)"/>
    </linearGradient>
    <radialGradient id="orb-iris" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#6a4ae0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6a4ae0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-ember" cx="0.1" cy="0.9" r="0.45">
      <stop offset="0%" stop-color="#8a6a2a" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8a6a2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C78F"/>
      <stop offset="100%" stop-color="#f2d5a6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb-iris)"/>
  <rect width="1200" height="630" fill="url(#orb-ember)"/>

  <!-- subtle dots (particles) -->
  <g fill="#E8C78F" opacity="0.35">
    <circle cx="120" cy="90"  r="1.4"/>
    <circle cx="340" cy="160" r="1"/>
    <circle cx="560" cy="60"  r="1.2"/>
    <circle cx="880" cy="130" r="1.5"/>
    <circle cx="1080" cy="80" r="1"/>
    <circle cx="160" cy="520" r="1.3"/>
    <circle cx="420" cy="570" r="1"/>
    <circle cx="780" cy="540" r="1.4"/>
    <circle cx="1020" cy="580" r="1.2"/>
  </g>

  <!-- Card -->
  <g transform="translate(360, 85)">
    <rect width="480" height="460" rx="26" fill="url(#card)" stroke="rgba(232,199,143,0.14)" stroke-width="1"/>

    <!-- Kicker -->
    <text x="28" y="44" font-family="JetBrains Mono, monospace" font-size="12" fill="#77715f" letter-spacing="2">N° 024</text>
    <circle cx="420" cy="40" r="5" fill="#6dd26d"/>
    <text x="434" y="44" font-family="JetBrains Mono, monospace" font-size="12" fill="#a8a28d" letter-spacing="1">AVAILABLE FOR PROJECTS</text>

    <!-- Avatar -->
    <circle cx="68" cy="118" r="36" fill="rgba(232,199,143,0.12)" stroke="url(#mark)" stroke-width="1.5"/>
    <text x="68" y="126" text-anchor="middle" font-family="Fraunces, serif" font-size="28" font-weight="700" fill="#E8C78F">P</text>

    <!-- Name -->
    <text x="122" y="112" font-family="Fraunces, serif" font-size="32" font-weight="600" fill="#ece5d2">Pratik Kharva<tspan fill="#E8C78F">.</tspan></text>
    <text x="122" y="138" font-family="Outfit, sans-serif" font-size="13" fill="#a8a28d">Full-Stack Developer  /  Ahmedabad, IN</text>

    <!-- Tagline bar -->
    <rect x="28" y="168" width="424" height="34" rx="6" fill="rgba(255,255,255,0.025)" stroke="rgba(232,199,143,0.14)"/>
    <text x="40" y="190" font-family="JetBrains Mono, monospace" font-size="11" fill="#E8C78F">&gt;  Full-Stack Developer · React.js · Node.js · Express</text>

    <!-- Metrics -->
    <g transform="translate(28, 220)">
      <rect width="200" height="70" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(232,199,143,0.1)"/>
      <text x="16" y="42" font-family="Fraunces, serif" font-size="30" fill="#ece5d2">1<tspan fill="#E8C78F" font-style="italic">+</tspan></text>
      <text x="16" y="60" font-family="JetBrains Mono, monospace" font-size="9" fill="#77715f" letter-spacing="1.5">YEARS EXPERIENCE</text>
    </g>
    <g transform="translate(244, 220)">
      <rect width="208" height="70" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(232,199,143,0.1)"/>
      <text x="16" y="42" font-family="Fraunces, serif" font-size="30" fill="#ece5d2">5<tspan fill="#E8C78F" font-style="italic">+</tspan></text>
      <text x="16" y="60" font-family="JetBrains Mono, monospace" font-size="9" fill="#77715f" letter-spacing="1.5">PROJECTS SHIPPED</text>
    </g>

    <!-- Contact rows -->
    <g transform="translate(28, 306)">
      <rect width="424" height="42" rx="8" fill="rgba(255,255,255,0.02)"/>
      <rect x="10" y="9" width="24" height="24" rx="6" fill="rgba(232,199,143,0.1)"/>
      <text x="46" y="22" font-family="JetBrains Mono, monospace" font-size="8" fill="#77715f" letter-spacing="1.5">EMAIL</text>
      <text x="46" y="36" font-family="Outfit, sans-serif" font-size="12" fill="#ece5d2">pratikkharva01@gmail.com</text>
    </g>

    <!-- CTA -->
    <g transform="translate(28, 368)">
      <rect width="424" height="58" rx="12" fill="rgba(232,199,143,0.95)"/>
      <rect x="12" y="12" width="34" height="34" rx="8" fill="rgba(0,0,0,0.2)"/>
      <text x="58" y="30" font-family="Outfit, sans-serif" font-size="14" font-weight="600" fill="#141018">Download Résumé</text>
      <text x="58" y="46" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(20,16,24,0.65)">PDF  ·  248 KB  ·  Updated Jan 2026</text>
      <path d="M400 29 h12 M406 23 l6 6 -6 6" stroke="#141018" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Footer label -->
  <text x="600" y="600" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#4a4638" letter-spacing="3">
    index.html   ·   3D PARALLAX PROFILE CARD   ·   PREVIEW
  </text>
</svg>
