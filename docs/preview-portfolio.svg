<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Multi-section Portfolio preview">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1422"/>
      <stop offset="100%" stop-color="#060a13"/>
    </linearGradient>
    <radialGradient id="glow-cyan" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-amber" cx="0.85" cy="0.8" r="0.45">
      <stop offset="0%" stop-color="#ffb400" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffb400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ffb400"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,240,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>
  <rect width="1200" height="630" fill="url(#glow-amber)"/>

  <!-- Navbar -->
  <g>
    <rect x="0" y="0" width="1200" height="72" fill="rgba(10,10,15,0.7)"/>

    <!-- Logo -->
    <g transform="translate(60, 20)">
      <rect x="0" y="0" width="32" height="32" rx="8" fill="#0a0a0f" stroke="url(#brand)" stroke-width="1.5"/>
      <text x="16" y="22" text-anchor="middle" font-family="Syne, sans-serif" font-size="15" font-weight="800" fill="url(#brand)" letter-spacing="-1">PK</text>
      <text x="42" y="22" font-family="Syne, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Pratik</text>
      <text x="87" y="22" font-family="Syne, sans-serif" font-size="15" font-weight="700" fill="url(#brand)">Kharva</text>
    </g>

    <!-- Nav links -->
    <g font-family="DM Sans, sans-serif" font-size="12" fill="#a0a8b4">
      <text x="720" y="42">Home</text>
      <text x="760" y="42">About</text>
      <text x="802" y="42">Projects</text>
      <text x="854" y="42">Case Studies</text>
      <text x="928" y="42">Skills</text>
      <text x="968" y="42">Blog</text>
      <text x="998" y="42">FAQ</text>
      <text x="1028" y="42" fill="#00f0ff">Contact</text>
    </g>
    <rect x="1090" y="24" width="60" height="28" rx="4" fill="#00f0ff"/>
    <text x="1120" y="42" text-anchor="middle" font-family="Syne, sans-serif" font-size="11" font-weight="700" fill="#0a0a0f">Hire Me</text>
  </g>

  <!-- Hero content -->
  <g transform="translate(100, 140)">
    <text font-family="JetBrains Mono, monospace" font-size="11" fill="#00f0ff" letter-spacing="3">— HELLO, I'M</text>

    <text x="0" y="84" font-family="Syne, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">Pratik</text>
    <text x="0" y="158" font-family="Syne, sans-serif" font-size="76" font-weight="800" fill="url(#brand)" letter-spacing="-2">Kharva</text>

    <text x="0" y="196" font-family="JetBrains Mono, monospace" font-size="12" fill="#00f0ff" letter-spacing="2.5">REACT DEVELOPER · WEB DEVELOPER IN AHMEDABAD, INDIA</text>

    <text x="0" y="230" font-family="DM Sans, sans-serif" font-size="14" fill="#c2c8d1">
      <tspan>React developer and frontend developer in India building</tspan>
      <tspan x="0" dy="22">fast, responsive web apps with React.js, Node.js, and MySQL.</tspan>
    </text>

    <!-- CTAs -->
    <rect x="0" y="296" width="150" height="44" rx="4" fill="#00f0ff"/>
    <text x="75" y="323" text-anchor="middle" font-family="Syne, sans-serif" font-size="13" font-weight="600" fill="#0a0a0f">View Projects →</text>

    <rect x="162" y="296" width="180" height="44" rx="4" fill="none" stroke="#00f0ff" stroke-width="1.2"/>
    <text x="252" y="323" text-anchor="middle" font-family="Syne, sans-serif" font-size="13" font-weight="600" fill="#00f0ff">Download Résumé ↓</text>

    <!-- Stats -->
    <g transform="translate(0, 380)">
      <text font-family="Syne, sans-serif" font-size="26" font-weight="700" fill="#ffffff">1+</text>
      <text y="18" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a8b4">Years Exp.</text>

      <text x="110" font-family="Syne, sans-serif" font-size="26" font-weight="700" fill="#ffffff">5+</text>
      <text x="110" y="18" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a8b4">Projects</text>

      <text x="220" font-family="Syne, sans-serif" font-size="26" font-weight="700" fill="#ffffff">10+</text>
      <text x="220" y="18" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a8b4">Technologies</text>
    </g>
  </g>

  <!-- Cube (right visual) -->
  <g transform="translate(880, 200)">
    <polygon points="0,60 60,0 180,0 120,60" fill="rgba(0,240,255,0.08)" stroke="#00f0ff" stroke-width="1"/>
    <polygon points="0,60 120,60 120,200 0,140" fill="rgba(255,180,0,0.06)" stroke="#ffb400" stroke-width="1"/>
    <polygon points="120,60 180,0 180,140 120,200" fill="rgba(139,93,255,0.08)" stroke="#8b5dff" stroke-width="1"/>
    <text x="60" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#ffffff" font-weight="700">&lt;/&gt;</text>

    <!-- Orbit dots -->
    <circle cx="-10" cy="90" r="4" fill="#00f0ff"/>
    <circle cx="200" cy="170" r="4" fill="#ffb400"/>
    <circle cx="90" cy="-20" r="4" fill="#8b5dff"/>
  </g>

  <!-- Footer label -->
  <text x="600" y="604" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a4050" letter-spacing="3">
    website.html   ·   MULTI-SECTION PORTFOLIO   ·   PREVIEW
  </text>
</svg>
